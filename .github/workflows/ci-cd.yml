name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:

  # ------------------- 1. LINT STAGE -------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker-based Python lint for consistent environment
      - name: Lint Python (flake8) inside Docker
        run: |
          docker build -f api/Dockerfile -t api-lint .
          docker run --rm api-lint flake8 api worker

      # JS Lint
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install JS deps
        run: |
          cd frontend
          npm install

      - name: Lint JS
        run: |
          cd frontend
          npx eslint .

      # Docker Lint
      - name: Install hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ------------------- 2. TEST STAGE -------------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image for tests
        run: docker build -f api/Dockerfile -t api-test .

      - name: Run tests inside Docker
        run: docker run --rm --network host api-test pytest --maxfail=1 --disable-warnings -q --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage.xml

  # ------------------- 3. BUILD STAGE -------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} frontend

  # ------------------- 4. SECURITY SCAN -------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan filesystem for vulnerabilities
        run: |
          trivy fs . --severity CRITICAL --exit-code 1

  # ------------------- 5. INTEGRATION TEST -------------------
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start full system
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Submit job
        run: curl -X POST http://localhost:8000/jobs

      - name: Verify API health
        run: curl -f http://localhost:8000/docs

      - name: Check worker logs
        run: docker logs worker

      - name: Tear down system
        if: always()
        run: docker compose down

  # ------------------- 6. DEPLOY STAGE -------------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deployment simulation
        run: |
          docker compose up -d --build
          echo "Waiting for health check..."
          sleep 30
          curl -f http://localhost:8000/docs
          docker compose down
          echo "Deployment successful"