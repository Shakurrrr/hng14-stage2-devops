name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: LINT
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8 autopep8

      - name: Lint Python — api
        run: |
          autopep8 --in-place --recursive api/
          flake8 api/ --max-line-length=120 --exclude=__pycache__

      - name: Lint Python — worker
        run: |
          autopep8 --in-place --recursive worker/
          flake8 worker/ --max-line-length=120 --exclude=__pycache__

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript — frontend
        working-directory: frontend
        run: npx eslint@8 app.js --env node --env es2021 --parser-options=ecmaVersion:12

      - name: Install hadolint
        run: |
          curl -sL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile — api
        run: hadolint api/Dockerfile

      - name: Lint Dockerfile — worker
        run: hadolint worker/Dockerfile

      - name: Lint Dockerfile — frontend
        run: hadolint frontend/Dockerfile

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: TEST
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: api
        run: pip install fastapi uvicorn redis fakeredis pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3: BUILD
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tags for downstream jobs
        run: |
          echo "API_IMAGE=localhost:5000/api:${{ github.sha }}" >> image-tags.env
          echo "WORKER_IMAGE=localhost:5000/worker:${{ github.sha }}" >> image-tags.env
          echo "FRONTEND_IMAGE=localhost:5000/frontend:${{ github.sha }}" >> image-tags.env

      - name: Upload image tags artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image-tags.env

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4: SECURITY SCAN
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild images into local registry for scanning
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:${{ github.sha }}

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            localhost:5000/frontend:${{ github.sha }}

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5: INTEGRATION TEST
# ─────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: > 
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=integrationtestpassword" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "APP_ENV=production" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Build and bring stack up
        run: docker compose up --build -d

      - name: Wait for Redis to be ready
        run: |
          echo "Waiting for Redis service to be healthy..."
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q redis) 2>/dev/null || echo "starting")
            echo "Attempt $i — Redis: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Redis is ready!"
              break