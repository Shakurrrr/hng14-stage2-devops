name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: LINT
# ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8 autopep8

      - name: Lint Python — api
        run: |
          autopep8 --in-place --recursive api/
          flake8 api/ --max-line-length=120 --exclude=__pycache__

      - name: Lint Python — worker
        run: |
          autopep8 --in-place --recursive worker/
          flake8 worker/ --max-line-length=120 --exclude=__pycache__

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript — frontend
        working-directory: frontend
        run: npx eslint@8 app.js --env node --env es2021 --parser-options=ecmaVersion:12

      - name: Install hadolint
        run: |
          curl -sL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile — api
        run: hadolint api/Dockerfile

      - name: Lint Dockerfile — worker
        run: hadolint worker/Dockerfile

      - name: Lint Dockerfile — frontend
        run: hadolint frontend/Dockerfile


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: TEST
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: api
        run: pip install fastapi uvicorn redis fakeredis pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: api
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3: BUILD
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tags for downstream jobs
        run: |
          echo "API_IMAGE=localhost:5000/api:${{ github.sha }}" >> image-tags.env
          echo "WORKER_IMAGE=localhost:5000/worker:${{ github.sha }}" >> image-tags.env
          echo "FRONTEND_IMAGE=localhost:5000/frontend:${{ github.sha }}" >> image-tags.env

      - name: Upload image tags artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image-tags.env


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4: SECURITY SCAN
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rebuild images into local registry for scanning
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:${{ github.sha }}

      - name: Scan Worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:${{ github.sha }}

      - name: Scan Frontend image
        run: |
          trivy image \
            --exit-code 0 \
            --severity CRITICAL \
            --scanners vuln \
            --skip-version-check \
            localhost:5000/frontend:${{ github.sha }}

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif
            

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5: INTEGRATION TEST
# ─────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=integrationtestpassword" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "APP_ENV=production" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Build and bring stack up
        run: docker compose up --build -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 30); do
            FRONTEND=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend) 2>/dev/null || echo "starting")
            API=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "starting")
            WORKER=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q worker) 2>/dev/null || echo "starting")
            echo "Attempt $i — frontend: $FRONTEND | api: $API | worker: $WORKER"
            if [ "$FRONTEND" = "healthy" ] && [ "$API" = "healthy" ] && [ "$WORKER" = "healthy" ]; then
              echo "All services healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Services did not become healthy in time."
          docker compose logs
          exit 1

      - name: Submit a job via frontend
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json")
          echo "Submit response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job is completed
        run: |
          echo "Polling job $JOB_ID for completion..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i — status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully."
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time."
          docker compose logs
          exit 1

      - name: Show all logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down --volumes --remove-orphans


# ─────────────────────────────────────────────────────────────────────────────
# STAGE 6: DEPLOY
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deploy secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "DEPLOY_HOST secret not set — skipping deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via rolling update
        if: steps.check_secrets.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "Pulling latest code..."
            git pull origin main
            echo "Building new images..."
            docker compose build
            SERVICES="api worker frontend"
            for SERVICE in $SERVICES; do
              echo "Rolling update for: $SERVICE"
              OLD_CONTAINER=$(docker compose ps -q $SERVICE 2>/dev/null || true)
              docker compose up -d --no-deps --scale ${SERVICE}=2 $SERVICE
              DEADLINE=$((SECONDS + 60))
              NEW_HEALTHY=false
              while [ $SECONDS -lt $DEADLINE ]; do
                NEW_CONTAINER=$(docker compose ps -q $SERVICE | tail -1)
                HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null || echo "none")
                echo "  Health: $HEALTH"
                if [ "$HEALTH" = "healthy" ]; then
                  NEW_HEALTHY=true
                  break
                fi
                sleep 5
              done
              if [ "$NEW_HEALTHY" = "false" ]; then
                echo "Health check failed — aborting, old container left running"
                docker compose up -d --no-deps --scale ${SERVICE}=1 $SERVICE
                exit 1
              fi
              if [ -n "$OLD_CONTAINER" ]; then
                docker stop $OLD_CONTAINER
                docker rm $OLD_CONTAINER
              fi
              docker compose up -d --no-deps --scale ${SERVICE}=1 $SERVICE
              echo "$SERVICE rolling update complete."
            done
            echo "All services deployed successfully."
            docker compose ps

      - name: Deploy skipped
        if: steps.check_secrets.outputs.skip == 'true'
        run: echo "Deploy skipped — no server configured. Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT and DEPLOY_PATH secrets to enable."