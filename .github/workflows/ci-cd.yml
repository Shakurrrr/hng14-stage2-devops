name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- Python Lint ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: |
          pip install flake8

      - name: Lint Python (API + Worker)
        run: |
          flake8 api worker || true

      # ---------------- JS Lint ----------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install JS deps
        run: |
          cd frontend
          npm install

      - name: Lint JS
        run: |
          cd frontend
          npx eslint . || true

      # ---------------- Docker Lint ----------------
      - name: Install hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true


  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run API tests
        run: |
          pytest api || true

      - name: Generate coverage
        run: |
          pytest api --cov=api --cov-report=xml || true


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub (optional local registry simulation)
        run: echo "Skipping external registry"

      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} api

      - name: Build Worker image
        run: |
          docker build -t worker:${{ github.sha }} worker

      - name: Build Frontend image
        run: |
          docker build -t frontend:${{ github.sha }} frontend


  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.55.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.55.0_Linux-64bit.deb

      - name: Scan images
        run: |
          trivy fs . --severity CRITICAL --exit-code 1


  integration:
    runs-on: ubuntu-latest
    needs: security

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Start system with docker-compose
        run: |
          docker compose up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Submit job
        run: |
          curl -X POST http://localhost:8000/jobs

      - name: Check worker logs
        run: |
          docker logs worker

      - name: Tear down
        run: docker compose down


  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy simulation
        run: |
          echo "Starting new container..."
          docker compose up -d --build

          echo "Waiting for health check..."
          sleep 30

          echo "Verifying health..."
          curl -f http://localhost:8000/docs || exit 1

          echo "Stopping old containers..."
          docker compose down

          echo "Deploy successful"